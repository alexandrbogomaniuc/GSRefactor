# Human-readable descriptions for cluster-hosts.properties keys.

GS_BACKEND_HOST=GS backend hostname used by static proxy and internal routing.
GS_BACKEND_PORT=GS backend HTTP port.

CASSANDRA_HOST=Cassandra hostname for GS/MP persistence.
CASSANDRA_PORT=Cassandra native transport port.

ZOOKEEPER_HOST=Zookeeper hostname for Kafka/cluster coordination.
ZOOKEEPER_PORT=Zookeeper client port.

KAFKA_HOST=Kafka broker hostname for event backbone.
KAFKA_PORT=Kafka broker port for internal services.
KAFKA_EXTERNAL_HOST=Kafka advertised host for host-machine access.
KAFKA_EXTERNAL_PORT=Kafka advertised port for host-machine access.

MP_HOST=Multiplayer service hostname.
MP_PORT=Multiplayer websocket server port.
MP_JETTY_HOST=Multiplayer Jetty hostname.
MP_JETTY_PORT=Multiplayer Jetty HTTP port.

STATIC_HOST=Static gateway hostname.
STATIC_PORT=Static gateway HTTP port.

CM_HOST=Casino module hostname.
CM_PORT=Casino module port.

CONFIG_SERVICE_HOST=Refactor config-service hostname.
CONFIG_SERVICE_PORT=Refactor config-service port.
CONFIG_PORTAL_USE_CONFIG_SERVICE=Enable portal bridge to config-service workflow endpoints.

SESSION_SERVICE_HOST=Refactor session-service hostname.
SESSION_SERVICE_PORT=Refactor session-service port.
SESSION_SERVICE_ROUTE_ENABLED=Enable canary routing from GS facade to session-service.
SESSION_SERVICE_CANARY_BANKS=Comma-separated bank IDs eligible for session-service canary.
SESSION_SERVICE_KAFKA_BROKERS=Kafka brokers used by session-service outbox relay.
SESSION_SERVICE_OUTBOX_TOPIC=Primary Kafka topic for session outbox events.
SESSION_SERVICE_OUTBOX_DLQ_TOPIC=Dead-letter Kafka topic for failed outbox events.
SESSION_SERVICE_OUTBOX_RELAY_ENABLED=Enable Kafka relay worker inside session-service.
SESSION_SERVICE_OUTBOX_RELAY_POLL_MS=Outbox relay polling interval in milliseconds.
SESSION_SERVICE_OUTBOX_MAX_ATTEMPTS=Max publish retries before DLQ.
SESSION_SERVICE_OUTBOX_RETRY_BASE_MS=Base backoff interval in milliseconds for retries.
SESSION_SERVICE_OUTBOX_BATCH_LIMIT=Max outbox events fetched per relay poll.
SESSION_SERVICE_OUTBOX_REPLAY_MAX_COUNT=Max DLQ replay items per manual replay operation.
SESSION_SERVICE_OUTBOX_REPLAY_WINDOW_SECONDS=Replay guard window in seconds.

GAMEPLAY_ORCHESTRATOR_HOST=Refactor gameplay-orchestrator hostname.
GAMEPLAY_ORCHESTRATOR_PORT=Refactor gameplay-orchestrator port.
GAMEPLAY_ORCHESTRATOR_ROUTE_ENABLED=Enable canary routing from GS facade to gameplay-orchestrator.
GAMEPLAY_ORCHESTRATOR_CANARY_BANKS=Comma-separated bank IDs eligible for gameplay canary.
GAMEPLAY_STATE_CACHE_BACKEND=State blob backend for gameplay service (file or redis).
GAMEPLAY_STATE_BLOB_TTL_SECONDS=Default TTL in seconds for deterministic gameplay state blobs.

REDIS_HOST=Redis hostname for gameplay deterministic state blob cache.
REDIS_PORT=Redis port for gameplay deterministic state blob cache.
REDIS_DB=Redis logical database index used by gameplay service.

WALLET_ADAPTER_HOST=Refactor wallet-adapter hostname.
WALLET_ADAPTER_PORT=Refactor wallet-adapter port.
WALLET_ADAPTER_ROUTE_ENABLED=Enable canary routing from GS facade to wallet-adapter.
WALLET_ADAPTER_CANARY_BANKS=Comma-separated bank IDs eligible for wallet-adapter canary.

BONUS_FRB_SERVICE_HOST=Refactor bonus/FRB service hostname.
BONUS_FRB_SERVICE_PORT=Refactor bonus/FRB service port.
BONUS_FRB_SERVICE_ROUTE_ENABLED=Enable canary routing from GS facade to bonus/FRB service.
BONUS_FRB_SERVICE_CANARY_BANKS=Comma-separated bank IDs eligible for bonus/FRB canary.

HISTORY_SERVICE_HOST=Refactor history-service hostname.
HISTORY_SERVICE_PORT=Refactor history-service port.
HISTORY_SERVICE_ROUTE_ENABLED=Enable canary routing from GS facade to history-service.
HISTORY_SERVICE_CANARY_BANKS=Comma-separated bank IDs eligible for history-service canary.

MULTIPLAYER_SERVICE_HOST=Refactor multiplayer-service hostname.
MULTIPLAYER_SERVICE_PORT=Refactor multiplayer-service port.
MULTIPLAYER_SERVICE_ROUTE_ENABLED=Enable canary routing from GS facade to multiplayer-service.
MULTIPLAYER_SERVICE_CANARY_BANKS=Comma-separated bank IDs eligible for multiplayer-service canary.
MULTIPLAYER_SERVICE_BANK_FLAGS=Per-bank multiplayer capability map (e.g. 6275:false,271:true).

PROTOCOL_ADAPTER_HOST=Refactor protocol-adapter hostname.
PROTOCOL_ADAPTER_PORT=Refactor protocol-adapter port.
PROTOCOL_ADAPTER_ROUTE_ENABLED=Enable canary routing from GS facade to protocol-adapter.
PROTOCOL_ADAPTER_CANARY_BANKS=Comma-separated bank IDs eligible for protocol-adapter canary.
PROTOCOL_ADAPTER_DEFAULT_MODE=Default response format mode for banks without explicit override.
PROTOCOL_ADAPTER_BANK_MODES=Per-bank protocol modes mapping (e.g. 6275:JSON).
PROTOCOL_ADAPTER_JSON_HASH_ENABLED=Enable hash validation for JSON protocol requests.
PROTOCOL_ADAPTER_JSON_HASH_HEADER=Request header name used for JSON hash.
PROTOCOL_ADAPTER_JSON_HASH_ENFORCEMENT_MODE=Hash policy mode: OFF, SHADOW, or ENFORCE.
PROTOCOL_ADAPTER_JSON_HASH_EXEMPT_ENDPOINTS=Comma-separated endpoints excluded from hash checks.
PROTOCOL_ADAPTER_JSON_GET_HASH_RULES=GET hash concatenation rules per endpoint.
PROTOCOL_ADAPTER_JSON_REPLAY_ENABLED=Enable nonce replay protection for JSON protocol.
PROTOCOL_ADAPTER_JSON_REPLAY_WINDOW_SECONDS=Replay check window in seconds.
PROTOCOL_ADAPTER_JSON_NONCE_TTL_SECONDS=Nonce TTL in seconds for replay prevention.
PROTOCOL_ADAPTER_JSON_SECRET_REFS=Per-bank secret references for hash calculation.

TEMPLATE_MANAGER_LOCAL_CLUSTERS=Cluster list shown under Local section in template manager.
TEMPLATE_MANAGER_COPY_CLUSTERS=Cluster list shown under Copy section in template manager.
TEMPLATE_MANAGER_LIVE_CLUSTERS=Cluster list shown under Live section in template manager.
