version: '3.8'

services:
  gs:
    build: ../configs/gs
    image: refactor-jetty-gs
    environment:
      - CASSANDRA_HOST=${CASSANDRA_HOST}
      - CASSANDRA_PORT=${CASSANDRA_PORT}
      - ZOOKEEPER_HOST=${ZOOKEEPER_HOST}
      - ZOOKEEPER_PORT=${ZOOKEEPER_PORT}
      - KAFKA_HOST=${KAFKA_HOST}
      - KAFKA_PORT=${KAFKA_PORT}
      - GS_JAVA_OPTS=${GS_JAVA_OPTS:-}
    volumes:
      - "../../../../Doker/runtime-gs/webapps/gs:/var/lib/jetty/webapps"
      - "../../../../Doker/runtime-gs/logs/gs:/www/logs/tomcat.gs"
      - "../../../../Doker/runtime-gs/default-configs:/www/html/gs/ROOT/export"
    networks:
      - refactor-network
    ports:
      - "18081:8080"
      - "16000:6000"
      - "16001:6001"
      - "19000:9000"
    depends_on:
      - c1
      - zookeeper
      - kafka
      - mp

  mp:
    build: ../configs/gs
    image: refactor-jetty-gs
    working_dir: /app
    volumes:
      - "../../../../../mq-mp-clean-version/web/target:/legacy-mp-target:ro"
    networks:
      - refactor-network
    depends_on:
      - c1
      - zookeeper
      - kafka
    command: >
      sh -lc "MP_WEBROOT=/tmp/web-mp-casino;
      rm -rf $$MP_WEBROOT
      && cp -R /legacy-mp-target/web-mp-casino $$MP_WEBROOT
      && sed -i 's#<hosts>.*</hosts>#<hosts>${CASSANDRA_HOST}:${CASSANDRA_PORT}</hosts>#' $$MP_WEBROOT/WEB-INF/classes/mp-keyspace-config.xml
      && java -DMP_SERVER_ID=1
      -DHOSTNAME=mp-refactor-1
      -DSERVER_VM_IP=${MP_HOST}
      -Dserver.host=0.0.0.0
      -Dserver.port=${MP_PORT}
      -Dserver.jetty.host=0.0.0.0
      -Dserver.jetty.port=${MP_JETTY_PORT}
      -Dserver.jetty.webroot=file:$$MP_WEBROOT/
      -Dkafka.hosts=${KAFKA_HOST}:${KAFKA_PORT}
      -Dzookeeper.connect=${ZOOKEEPER_HOST}:${ZOOKEEPER_PORT}
      -Dzookeeper.pool-size=1
      -Dzookeeper.server-id-path=/mp_refactor
      -Dzookeeper.server-id-pool-path=/mp_refactor/pool
      -cp .:$$MP_WEBROOT/WEB-INF/classes:$$MP_WEBROOT/WEB-INF/lib/*
      com.betsoft.casino.mp.web.NettyServer"
    ports:
      - "16300:6300"
      - "16301:6301"

  c1:
    image: cassandra:2.1.20
    volumes:
      - "../../../../Doker/runtime-gs/logs/cassandra:/var/log/cassandra"
      - "refactor-cassandra-data:/var/lib/cassandra"
    networks:
      - refactor-network
    environment:
      - MAX_HEAP_SIZE=800M
      - HEAP_NEWSIZE=300M
    ports:
      - "19142:9042"

  c1-refactor:
    image: ${CASSANDRA_REFACTOR_TARGET_IMAGE:-cassandra:4.1}
    volumes:
      - "../../../../Doker/runtime-gs/logs/cassandra-refactor:/var/log/cassandra"
      - "refactor-cassandra-target-data:/var/lib/cassandra"
    networks:
      - refactor-network
    environment:
      - MAX_HEAP_SIZE=800M
      - HEAP_NEWSIZE=300M
      - CASSANDRA_CLUSTER_NAME=refactor-target-upgrade
    ports:
      - "19412:9042"

  zookeeper:
    image: zookeeper:3.8
    networks:
      - refactor-network
    ports:
      - "12181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    networks:
      - refactor-network
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=${ZOOKEEPER_HOST}:${ZOOKEEPER_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${KAFKA_HOST}:${KAFKA_PORT},PLAINTEXT_HOST://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT}
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "19092:29092"

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    networks:
      - refactor-network
    volumes:
      - refactor-redis-data:/data
    ports:
      - "16379:6379"

  static:
    build: ../configs/static
    image: refactor-static
    volumes:
      - "../../../../Doker/runtime-gs/webapps/gs/ROOT:/www/html/gss:ro"
      - "../../../../Doker/runtime-gs/static:/www/html/stat"
      - "../../../../Doker/runtime-gs/logs/nginx:/var/log/nginx/"
    ports:
      - "18080:80"
    networks:
      - refactor-network
    depends_on:
      - gs

  config-service:
    build: ../../../refactor-services/config-service
    image: refactor-config-service
    environment:
      - PORT=${CONFIG_SERVICE_PORT}
      - SERVICE_NAME=config-service
    volumes:
      - refactor-config-service-data:/data
    ports:
      - "${CONFIG_SERVICE_PORT}:${CONFIG_SERVICE_PORT}"
    networks:
      - refactor-network

  session-service:
    build: ../../../refactor-services/session-service
    image: refactor-session-service
    environment:
      - PORT=${SESSION_SERVICE_PORT}
      - SERVICE_NAME=session-service
      - SESSION_SERVICE_ROUTE_ENABLED=${SESSION_SERVICE_ROUTE_ENABLED}
      - SESSION_SERVICE_CANARY_BANKS=${SESSION_SERVICE_CANARY_BANKS}
      - SESSION_SERVICE_KAFKA_BROKERS=${SESSION_SERVICE_KAFKA_BROKERS}
      - SESSION_SERVICE_OUTBOX_TOPIC=${SESSION_SERVICE_OUTBOX_TOPIC}
      - SESSION_SERVICE_OUTBOX_DLQ_TOPIC=${SESSION_SERVICE_OUTBOX_DLQ_TOPIC}
      - SESSION_SERVICE_OUTBOX_RELAY_ENABLED=${SESSION_SERVICE_OUTBOX_RELAY_ENABLED}
      - SESSION_SERVICE_OUTBOX_RELAY_POLL_MS=${SESSION_SERVICE_OUTBOX_RELAY_POLL_MS}
      - SESSION_SERVICE_OUTBOX_MAX_ATTEMPTS=${SESSION_SERVICE_OUTBOX_MAX_ATTEMPTS}
      - SESSION_SERVICE_OUTBOX_RETRY_BASE_MS=${SESSION_SERVICE_OUTBOX_RETRY_BASE_MS}
      - SESSION_SERVICE_OUTBOX_BATCH_LIMIT=${SESSION_SERVICE_OUTBOX_BATCH_LIMIT}
      - SESSION_SERVICE_OUTBOX_REPLAY_MAX_COUNT=${SESSION_SERVICE_OUTBOX_REPLAY_MAX_COUNT}
      - SESSION_SERVICE_OUTBOX_REPLAY_WINDOW_SECONDS=${SESSION_SERVICE_OUTBOX_REPLAY_WINDOW_SECONDS}
    volumes:
      - refactor-session-service-data:/data
    ports:
      - "${SESSION_SERVICE_PORT}:${SESSION_SERVICE_PORT}"
    networks:
      - refactor-network

  gameplay-orchestrator:
    build: ../../../refactor-services/gameplay-orchestrator
    image: refactor-gameplay-orchestrator
    environment:
      - PORT=${GAMEPLAY_ORCHESTRATOR_PORT}
      - SERVICE_NAME=gameplay-orchestrator
      - GAMEPLAY_ORCHESTRATOR_ROUTE_ENABLED=${GAMEPLAY_ORCHESTRATOR_ROUTE_ENABLED}
      - GAMEPLAY_ORCHESTRATOR_CANARY_BANKS=${GAMEPLAY_ORCHESTRATOR_CANARY_BANKS}
      - GAMEPLAY_STATE_CACHE_BACKEND=${GAMEPLAY_STATE_CACHE_BACKEND}
      - GAMEPLAY_STATE_BLOB_TTL_SECONDS=${GAMEPLAY_STATE_BLOB_TTL_SECONDS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_DB=${REDIS_DB}
    volumes:
      - refactor-gameplay-orchestrator-data:/data
    ports:
      - "${GAMEPLAY_ORCHESTRATOR_PORT}:${GAMEPLAY_ORCHESTRATOR_PORT}"
    networks:
      - refactor-network
    depends_on:
      - redis

  wallet-adapter:
    build: ../../../refactor-services/wallet-adapter
    image: refactor-wallet-adapter
    environment:
      - PORT=${WALLET_ADAPTER_PORT}
      - SERVICE_NAME=wallet-adapter
      - WALLET_ADAPTER_ROUTE_ENABLED=${WALLET_ADAPTER_ROUTE_ENABLED}
      - WALLET_ADAPTER_CANARY_BANKS=${WALLET_ADAPTER_CANARY_BANKS}
    volumes:
      - refactor-wallet-adapter-data:/data
    ports:
      - "${WALLET_ADAPTER_PORT}:${WALLET_ADAPTER_PORT}"
    networks:
      - refactor-network

  bonus-frb-service:
    build: ../../../refactor-services/bonus-frb-service
    image: refactor-bonus-frb-service
    environment:
      - PORT=${BONUS_FRB_SERVICE_PORT}
      - SERVICE_NAME=bonus-frb-service
      - BONUS_FRB_SERVICE_ROUTE_ENABLED=${BONUS_FRB_SERVICE_ROUTE_ENABLED}
      - BONUS_FRB_SERVICE_CANARY_BANKS=${BONUS_FRB_SERVICE_CANARY_BANKS}
    volumes:
      - refactor-bonus-frb-service-data:/data
    ports:
      - "${BONUS_FRB_SERVICE_PORT}:${BONUS_FRB_SERVICE_PORT}"
    networks:
      - refactor-network

  history-service:
    build: ../../../refactor-services/history-service
    image: refactor-history-service
    environment:
      - PORT=${HISTORY_SERVICE_PORT}
      - SERVICE_NAME=history-service
      - HISTORY_SERVICE_ROUTE_ENABLED=${HISTORY_SERVICE_ROUTE_ENABLED}
      - HISTORY_SERVICE_CANARY_BANKS=${HISTORY_SERVICE_CANARY_BANKS}
    volumes:
      - refactor-history-service-data:/data
    ports:
      - "${HISTORY_SERVICE_PORT}:${HISTORY_SERVICE_PORT}"
    networks:
      - refactor-network

  multiplayer-service:
    build: ../../../refactor-services/multiplayer-service
    image: refactor-multiplayer-service
    environment:
      - PORT=${MULTIPLAYER_SERVICE_PORT}
      - SERVICE_NAME=multiplayer-service
      - MULTIPLAYER_SERVICE_ROUTE_ENABLED=${MULTIPLAYER_SERVICE_ROUTE_ENABLED}
      - MULTIPLAYER_SERVICE_CANARY_BANKS=${MULTIPLAYER_SERVICE_CANARY_BANKS}
      - MULTIPLAYER_SERVICE_BANK_FLAGS=${MULTIPLAYER_SERVICE_BANK_FLAGS}
    volumes:
      - refactor-multiplayer-service-data:/data
    ports:
      - "${MULTIPLAYER_SERVICE_PORT}:${MULTIPLAYER_SERVICE_PORT}"
    networks:
      - refactor-network

  protocol-adapter:
    build: ../../../refactor-services/protocol-adapter
    image: refactor-protocol-adapter
    environment:
      - PORT=${PROTOCOL_ADAPTER_PORT}
      - SERVICE_NAME=protocol-adapter
      - PROTOCOL_ADAPTER_ROUTE_ENABLED=${PROTOCOL_ADAPTER_ROUTE_ENABLED}
      - PROTOCOL_ADAPTER_CANARY_BANKS=${PROTOCOL_ADAPTER_CANARY_BANKS}
      - PROTOCOL_ADAPTER_DEFAULT_MODE=${PROTOCOL_ADAPTER_DEFAULT_MODE}
      - PROTOCOL_ADAPTER_BANK_MODES=${PROTOCOL_ADAPTER_BANK_MODES}
      - PROTOCOL_ADAPTER_JSON_HASH_ENABLED=${PROTOCOL_ADAPTER_JSON_HASH_ENABLED}
      - PROTOCOL_ADAPTER_JSON_HASH_HEADER=${PROTOCOL_ADAPTER_JSON_HASH_HEADER}
      - PROTOCOL_ADAPTER_JSON_HASH_ENFORCEMENT_MODE=${PROTOCOL_ADAPTER_JSON_HASH_ENFORCEMENT_MODE}
      - PROTOCOL_ADAPTER_JSON_HASH_EXEMPT_ENDPOINTS=${PROTOCOL_ADAPTER_JSON_HASH_EXEMPT_ENDPOINTS}
      - PROTOCOL_ADAPTER_JSON_GET_HASH_RULES=${PROTOCOL_ADAPTER_JSON_GET_HASH_RULES}
      - PROTOCOL_ADAPTER_JSON_REPLAY_ENABLED=${PROTOCOL_ADAPTER_JSON_REPLAY_ENABLED}
      - PROTOCOL_ADAPTER_JSON_REPLAY_WINDOW_SECONDS=${PROTOCOL_ADAPTER_JSON_REPLAY_WINDOW_SECONDS}
      - PROTOCOL_ADAPTER_JSON_NONCE_TTL_SECONDS=${PROTOCOL_ADAPTER_JSON_NONCE_TTL_SECONDS}
      - PROTOCOL_ADAPTER_JSON_SECRET_REFS=${PROTOCOL_ADAPTER_JSON_SECRET_REFS}
    volumes:
      - refactor-protocol-adapter-data:/data
    ports:
      - "${PROTOCOL_ADAPTER_PORT}:${PROTOCOL_ADAPTER_PORT}"
    networks:
      - refactor-network

networks:
  refactor-network:
    driver: bridge

volumes:
  refactor-cassandra-data:
  refactor-cassandra-target-data:
  refactor-redis-data:
  refactor-config-service-data:
  refactor-session-service-data:
  refactor-gameplay-orchestrator-data:
  refactor-wallet-adapter-data:
  refactor-bonus-frb-service-data:
  refactor-history-service-data:
  refactor-multiplayer-service-data:
  refactor-protocol-adapter-data:
