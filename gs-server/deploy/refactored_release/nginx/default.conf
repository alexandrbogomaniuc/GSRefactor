server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy JSP/launch paths back to webgs on 8080 so cwguestlogin redirect works on :80.
    location /free/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        proxy_pass http://refactored_release-webgs-1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header Accept-Encoding "";
        proxy_http_version 1.1;

        # Rewrite websocket port in HTML where present.
        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter "ws://127.0.0.1:8080/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2F127.0.0.1%3A8080%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "ws://127.0.0.1/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2F127.0.0.1%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "ws://localhost:8080/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2Flocalhost%3A8080%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "ws://localhost/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2Flocalhost%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "setIfMissing(queryParams, 'WEB_SOCKET_URL'," "queryParams.set('WEB_SOCKET_URL',";
    }

    location /real/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        proxy_pass http://refactored_release-webgs-1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header Accept-Encoding "";
        proxy_http_version 1.1;

        # Rewrite websocket port in HTML where present.
        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter "ws://127.0.0.1:8080/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2F127.0.0.1%3A8080%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "ws://127.0.0.1/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2F127.0.0.1%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "ws://localhost:8080/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2Flocalhost%3A8080%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "ws://localhost/websocket/mplobby" "ws://127.0.0.1:16300/websocket/mplobby";
        sub_filter "ws%3A%2F%2Flocalhost%2Fwebsocket%2Fmplobby" "ws%3A%2F%2F127.0.0.1%3A16300%2Fwebsocket%2Fmplobby";
        sub_filter "setIfMissing(queryParams, 'WEB_SOCKET_URL'," "queryParams.set('WEB_SOCKET_URL',";
    }

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        try_files $uri $uri/ $uri/index.html =404;
    }
}
